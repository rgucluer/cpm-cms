name: payload
networks:
  coolify:
    name: coolify
    external: true
services:
  payload:
    container_name: payload
    restart: unless-stopped
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    build:
      context: .
      dockerfile: Dockerfile.development
    environment:
      # Limits Node.js to 2GB of RAM to prevent the container from crashing the VPS
      - 'NODE_ENV=development'
    healthcheck:
      test: 'curl -f --head http://127.0.0.1:3000 || exit 1'
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    expose:
      - 3000    
    volumes:
      - node_app:/app
    working_dir: /app/
    networks:
      - coolify
    labels:
      traefik.enable: true
      coolify.managed: true
      coolify.proxy: true

volumes:
  node_app:
