version: '3.8'
name: payload
networks:
  coolify:
    name: coolify
    external: true
services:
  payload:
    build:
      context: .
      dockerfile: Dockerfile
    healthcheck:
      test: 'curl -f --head http://127.0.0.1:3000 || exit 1'
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    expose:
      - 3000    
    volumes:
      - node_app:/app
    working_dir: /app/
    networks:
      - coolify
    labels:
      - 'traefik.http.middlewares.redirect-to-www.redirectregex.regex=^(http|https):\/\/(?:www\.)?(.+)'
      - 'traefik.http.middlewares.redirect-to-www.redirectregex.replacement=${1}://www.${2}'
      - 'traefik.http.middlewares.redirect-to-www.redirectregex.permanent=true'
      - 'traefik.http.routers.app-root.rule=Host(`${APP_ROOT_DN}`)'
      - 'traefik.http.routers.app-root.entrypoints=https'
      - 'traefik.http.routers.app-root.tls.certresolver=letsencrypt'
      - 'traefik.http.routers.app-root.middlewares=redirect-to-www'
      - 'traefik.http.routers.app-root-http.rule=Host(`${APP_ROOT_DN}`)'
      - 'traefik.http.routers.app-root-http.entrypoints=http'
      - 'traefik.http.routers.app-root-http.middlewares=redirect-to-www'
volumes:
  node_app:

