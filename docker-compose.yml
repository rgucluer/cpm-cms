version: '3.8'

services:
  payload:
    build:
      context: .
      dockerfile: Dockerfile
    healthcheck:
      # test: 'wget -qO- ${NEXT_PUBLIC_SERVER_URL}/healthcheck || exit 1'
      test: 'true || exit 1'
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    expose:
      - 3000    
    volumes:
      - node_app:/app
    working_dir: /app/
    labels:
      - coolify.managed=true
      - coolify.proxy=true
      - traefik.enable=true
      - traefik.http.routers.payload-https.rule=Host(`www.iact.dev`) && PathPrefix(`/`)
      - traefik.http.routers.payload-https.entryPoints=https
      - traefik.http.routers.payload-https.middlewares=gzip
      - traefik.http.routers.payload-https.service=payload
      - traefik.http.routers.payload-https.tls=true
      - traefik.http.services.payload-https.loadbalancer.server.port=443
      - traefik.http.routers.payload-https.tls.certresolver=letsencrypt
      - traefik.http.routers.payload.rule=Host(`www.iact.dev`) && PathPrefix(`/`)
      - traefik.http.routers.payload.entryPoints=http
      - traefik.http.services.payload.loadbalancer.server.port=80
      - traefik.http.routers.payload.middlewares=redirect-to-https
volumes:
  node_app:

