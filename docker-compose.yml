name: payload
networks:
  coolify:
    name: coolify
    external: true
services:
  payload:
    restart: unless-stopped
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      # Limits Node.js to 2GB of RAM to prevent the container from crashing the VPS
      - 'NODE_OPTIONS=--max-old-space-size=2048'
    healthcheck:
      test: 'curl -f --head http://127.0.0.1:3000 || exit 1'
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    expose:
      - 3000    
    volumes:
      - node_app:/app
    working_dir: /app/
    networks:
      - coolify
    labels:
      traefik.enable: true
      coolify.managed: true
      coolify.proxy: true
      traefik.http.routers.payload-https.rule: "Host(`${APP_ROOT_DN}`)"
      traefik.http.routers.payload-https.entryPoints: "https"
      traefik.http.routers.payload-https.middlewares: "authentication@file"
      traefik.http.routers.payload-https.tls: true
      traefik.http.routers.payload-https.tls.domains[0].main: "${APP_ROOT_DN}"
      traefik.http.routers.payload-https.tls.certresolver: "letsencrypt"
      traefik.http.routers.payload-https.service: "payload-${COMPOSE_PROJECT_NAME}"
    # depends_on:
    #   - "traefik"

volumes:
  node_app:
