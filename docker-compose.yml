version: '3.8'
name: payload
networks:
  coolify:
    external: true
services:
  payload:
    build:
      context: .
      dockerfile: Dockerfile
    healthcheck:
      # test: 'curl -f ${NEXT_PUBLIC_SERVER_URL}/api/health || exit 1'
      test: true
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 45s
    expose:
      - 3000    
    volumes:
      - node_app:/app
    working_dir: /app/
    networks:
      - coolify
volumes:
  node_app:

