version: '3.8'

services:
  payload:
    build:
      context: .
      dockerfile: Dockerfile
    healthcheck:
      # test: 'wget -qO- ${NEXT_PUBLIC_SERVER_URL}/healthcheck || exit 1'
      test: 'true || exit 1'
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    expose:
      - 3000    
    volumes:
      - node_app:/app
      # - node_modules:/app/node_modules
    working_dir: /app/

