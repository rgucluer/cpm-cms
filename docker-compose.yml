version: '3'

services:
  payload:
    image: node:22.17.0-alpine
    expose:
      - 3000 
    # ports:
    #   - '3000:3000'
    volumes:
      - node_app:/home/node/app
      - node_modules:/home/node/app/node_modules
    working_dir: /home/node/app/
    command: sh -c "yarn install && yarn dev"
    depends_on:
      - mongo
    # env_file:
    #   - .env

  mongo:
    image: mongo:latest
    expose:
      - 27017
    # ports:
    #   - '27017:27017'
    command:
      - --storageEngine=wiredTiger
    volumes:
      - data:/data/db
    logging:
      driver: none

volumes:
  data:
  node_app:
  node_modules:
