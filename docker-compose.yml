name: payload
networks:
  coolify:
    name: coolify
    external: true
services:
  payload:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      # Limits Node.js to 2GB of RAM to prevent the container from crashing the VPS
      - 'NODE_OPTIONS=--max-old-space-size=2048'
    healthcheck:
      test: 'curl -f --head http://127.0.0.1:3000 || exit 1'
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    expose:
      - 3000    
    volumes:
      - node_app:/app
    working_dir: /app/
    networks:
      - coolify
volumes:
  node_app:
