version: '3.8'
name: payload
networks:
  coolify:
    external: true
services:
  payload:
    build:
      context: .
      dockerfile: Dockerfile
    healthcheck:
      test: 'curl -f https://localhost:3000/api/health || exit 1'
      interval: 30s
      timeout: 7s
      retries: 5
      start_period: 500s
    expose:
      - 3000    
    volumes:
      - node_app:/app
    working_dir: /app/
    networks:
      - coolify
volumes:
  node_app:

